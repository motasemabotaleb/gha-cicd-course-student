# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
# test the ci 
name: 02 CI Workflow

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      
      matrix:
        os: [ubuntu-latest]
        python-version: [3.12, 3.11]
    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6
      
      - name: List files
        run: ls -la
      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with: 
         python-version: ${{ matrix.python-version }}


      - name: Check Python version
        run: python --version
      
      - name: Show runner time
        run: date 
      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v
