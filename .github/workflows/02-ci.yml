# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
# test the ci 
name: 02 CI Workflow

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      
      matrix:
        os: [ubuntu-latest]
        python-version: [3.12, 3.11]
    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6
      
      - name: List files
        run: ls -la
      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with: 
         python-version: ${{ matrix.python-version }}

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v

  build:
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: [3.12, 3.11]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create artifact file
        run: |
          echo "Build for Python ${{ matrix.python-version }}" > output.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.python-version }}
          path: output.txt