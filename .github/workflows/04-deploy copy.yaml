name: 04 Deploy Workflow Copy

on:
  push:

env:
  BASE_IMAGE: python:3.12-slim
  IMAGE_NAME: tiny-health-app
  CONTAINER_NAME: tiny-health-container
  APP_PORT: 8000

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "APP_ENV=production" >> .env
          echo "PORT=${APP_PORT}" >> .env

      - name: Build Docker image (dynamic base)
        run: |
          docker build \
            -f Dockerfile.prod \
            --build-arg BASE_IMAGE=${BASE_IMAGE} \
            --build-arg APP_ENV=production \
            --build-arg APP_PORT=${APP_PORT} \
            -t ${IMAGE_NAME}:latest \
            .

      - name: Run container
        run: |
          docker run -d \
            --name ${CONTAINER_NAME} \
            --env-file .env \
            -p ${APP_PORT}:${APP_PORT} \
            ${IMAGE_NAME}:latest

      - name: Check container is running
        run: |
          docker ps

          if [ "$(docker ps -q -f name=${CONTAINER_NAME})" ]; then
            echo "Container is running ✅"
          else
            echo "Container is NOT running ❌"
            docker logs ${CONTAINER_NAME}
            exit 1
          fi

      # - name: Smoke test deployed app
      #   # Retry a few times because app startup can take a moment.
      #   run: |
      #     for attempt in {1..10}; do
      #       if curl --fail --silent http://127.0.0.1:8000/health; then
      #         exit 0
      #       fi
      #       echo "Waiting for app to become ready..."
      #       sleep 2
      #     done
      #     echo "App did not become ready in time."
      #     exit 1


      - name: Cleanup
        if: always()
        run: docker rm -f ${CONTAINER_NAME} || true