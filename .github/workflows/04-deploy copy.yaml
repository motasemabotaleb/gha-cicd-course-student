name: 04 Deploy Workflow

on:
  workflow_dispatch:

env:
  IMAGE_NAME: tiny-health-container-vars
  CONTAINER_NAME: tiny-health-container-vars    
  BASE_IMAGE: python:3.12-slim
  APP_PORT: 8000

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BASE_IMAGE=${{ env.BASE_IMAGE }} \
            -t ${{ env.IMAGE_NAME }} .

      - name: Run container
        run: |
          docker run -d \
            -p 8000:8000 \
            --name ${{ env.CONTAINER_NAME }} \
            ${{ env.IMAGE_NAME }}



      - name: Stop container
        if: always()
        run: docker rm -f ${{ env.CONTAINER_NAME }} || true