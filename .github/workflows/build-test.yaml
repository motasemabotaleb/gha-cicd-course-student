name: build-test
#77770
on:
  pull_request:
    types: [closed]
    branches: ["main"]

env:
  BASE_IMAGE: python:3.12-slim
  IMAGE_NAME: tiny-health-app
  CONTAINER_NAME: tiny-health-container
  APP_PORT: 8000

permissions:
  actions: read
  contents: read

jobs:
  build-and-test:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: image-tag
        run: |
          IMAGE_TAG="run-${GITHUB_RUN_NUMBER}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BASE_IMAGE=${BASE_IMAGE} \
            -t ${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }} \
            -t ${IMAGE_NAME}:latest \
            .

      - name: Run container
        run: |
          docker run -d \
            -p ${APP_PORT}:${APP_PORT} \
            --name ${CONTAINER_NAME} \
            ${IMAGE_NAME}:latest

      - name: Smoke test
        run: |
          for i in {1..10}; do
            if curl --fail http://127.0.0.1:${APP_PORT}/health; then
              echo "App is ready"
              exit 0
            fi
            sleep 2
          done
          echo "App failed"
          docker logs ${CONTAINER_NAME}
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f ${CONTAINER_NAME} || true